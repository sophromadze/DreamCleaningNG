  <style>
    .fb-customerchat {
      position: fixed !important;
      bottom: 20px !important;
      right: 20px !important;
      z-index: 9999 !important;
      display: block !important;
      width: auto !important;
      height: auto !important;
      visibility: visible !important;
      opacity: 1 !important;
    }
    .fb_dialog {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }
    .fb_dialog_content {
      display: block !important;

      opacity: 1 !important;
    }
  </style>

<body>
  <app-root></app-root>
  
  <!-- Messenger Chat Plugin Code -->
  <div id="fb-root"></div>
  <div id="fb-customer-chat" class="fb-customerchat"></div>

  <script>
    var chatbox = document.getElementById('fb-customer-chat');
    chatbox.setAttribute("page_id", "391239610738088");
    chatbox.setAttribute("attribution", "biz_inbox");
    chatbox.setAttribute("theme_color", "#0084ff");
    chatbox.setAttribute("logged_in_greeting", "Hi! How can we help you?");
    chatbox.setAttribute("logged_out_greeting", "Hi! How can we help you?");
    chatbox.setAttribute("greeting_dialog_display", "show");
    chatbox.setAttribute("greeting_dialog_delay", "0");
  </script>

  <!-- Load Facebook SDK -->
  <script>
    window.fbAsyncInit = function() {
      FB.init({
        xfbml: true,
        version: 'v18.0'
      });
      console.log('FB SDK initialized');
      
      // Debug FB object
      console.log('FB object:', FB);
      
      // Force refresh the chat plugin
      FB.XFBML.parse();
      console.log('Initial FB.XFBML.parse() called');
    };

    // Load the SDK asynchronously
    (function(d, s, id) {
      var js, fjs = d.getElementsByTagName(s)[0];
      if (d.getElementById(id)) return;
      js = d.createElement(s); js.id = id;
      js.src = 'https://connect.facebook.net/en_US/sdk.js';
      js.async = true;
      js.defer = true;
      js.crossOrigin = "anonymous";
      fjs.parentNode.insertBefore(js, fjs);
      console.log('Facebook SDK script added to page');

      // Load Customer Chat SDK after main SDK
      js.onload = function() {
        var customerChat = document.createElement('script');
        customerChat.src = 'https://connect.facebook.net/en_US/sdk/xfbml.customerchat.js';
        customerChat.async = true;
        customerChat.defer = true;
        customerChat.crossOrigin = "anonymous";
        fjs.parentNode.insertBefore(customerChat, fjs);
        console.log('Facebook Customer Chat SDK script added to page');
      };
    }(document, 'script', 'facebook-jssdk'));

    // Additional initialization check
    window.addEventListener('load', function() {
      console.log('Page loaded, checking chat initialization...');
      
      // Check for chat element
      var chatElement = document.querySelector('#fb-customer-chat');
      if (chatElement) {
        console.log('Chat element found:', chatElement);
        console.log('Chat element styles:', window.getComputedStyle(chatElement));
      } else {
        console.log('Chat element not found in DOM');
      }

      // Check for FB object periodically
      var checkFB = setInterval(function() {
        if (typeof FB !== 'undefined') {
          clearInterval(checkFB);
          console.log('FB SDK detected, current state:', {
            xfbml: FB.XFBML,
            customerChat: !!FB.CustomerChat,
            initialized: !!FB._initialized
          });
          
          // Multiple parse attempts
          FB.XFBML.parse();
          console.log('First parse attempt completed');
          
          setTimeout(function() {
            FB.XFBML.parse();
            console.log('Second parse attempt completed');
            
            // Check chat element again
            var chatElement = document.querySelector('#fb-customer-chat');
            if (chatElement) {
              console.log('Chat element after parse:', {
                display: window.getComputedStyle(chatElement).display,
                visibility: window.getComputedStyle(chatElement).visibility,
                opacity: window.getComputedStyle(chatElement).opacity
              });
            }
          }, 1000);
        }
      }, 100);
    });
  </script>
</body>
