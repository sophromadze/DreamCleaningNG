  <app-root></app-root>
  
  <!-- Messenger Chat Plugin Code -->
  <div id="fb-root"></div>
  <div class="fb-customerchat" attribution="biz_inbox" page_id="391239610738088" theme_color="#0084ff" logged_in_greeting="Hi! How can we help you?" logged_out_greeting="Hi! How can we help you?" greeting_dialog_display="show" greeting_dialog_delay="0" ref="fb-customer-chat">
  </div>

  <!-- Load Facebook SDK -->
  <script>
    window.fbAsyncInit = function() {
      FB.init({
        xfbml: true,
        version: 'v18.0'
      });
      console.log('FB SDK initialized');
      
      // Debug FB object
      console.log('FB object:', FB);
      
      // Force refresh the chat plugin
      FB.XFBML.parse();
      console.log('Initial FB.XFBML.parse() called');
      
      // Check if customer chat is available
      if (FB.CustomerChat) {
        console.log('FB.CustomerChat is available');
      } else {
        console.log('FB.CustomerChat is not available');
      }
    };

    // Load the SDK asynchronously
    (function(d, s, id) {
      var js, fjs = d.getElementsByTagName(s)[0];
      if (d.getElementById(id)) return;
      js = d.createElement(s); js.id = id;
      js.src = 'https://connect.facebook.net/en_US/sdk.js';
      js.async = true;
      js.defer = true;
      js.crossOrigin = "anonymous";
      fjs.parentNode.insertBefore(js, fjs);
      console.log('Facebook SDK script added to page');
    }(document, 'script', 'facebook-jssdk'));

    // Load Customer Chat SDK
    (function(d, s, id) {
      var js, fjs = d.getElementsByTagName(s)[0];
      if (d.getElementById(id)) return;
      js = d.createElement(s); js.id = id;
      js.src = 'https://connect.facebook.net/en_US/sdk/xfbml.customerchat.js';
      js.async = true;
      js.defer = true;
      js.crossOrigin = "anonymous";
      fjs.parentNode.insertBefore(js, fjs);
      console.log('Facebook Customer Chat SDK script added to page');
    }(document, 'script', 'facebook-customerchat-jssdk'));

    // Additional initialization check
    window.addEventListener('load', function() {
      console.log('Page loaded, checking chat initialization...');
      
      // Check for chat element
      var chatElement = document.querySelector('.fb-customerchat');
      if (chatElement) {
        console.log('Chat element found:', chatElement);
        console.log('Chat element styles:', window.getComputedStyle(chatElement));
      } else {
        console.log('Chat element not found in DOM');
      }

      // Check for FB object periodically
      var checkFB = setInterval(function() {
        if (typeof FB !== 'undefined') {
          clearInterval(checkFB);
          console.log('FB SDK detected, current state:', {
            xfbml: FB.XFBML,
            customerChat: !!FB.CustomerChat,
            initialized: !!FB._initialized
          });
          
          // Multiple parse attempts
          FB.XFBML.parse();
          console.log('First parse attempt completed');
          
          setTimeout(function() {
            FB.XFBML.parse();
            console.log('Second parse attempt completed');
            
            // Check chat element again
            var chatElement = document.querySelector('.fb-customerchat');
            if (chatElement) {
              console.log('Chat element after parse:', {
                display: window.getComputedStyle(chatElement).display,
                visibility: window.getComputedStyle(chatElement).visibility,
                opacity: window.getComputedStyle(chatElement).opacity
              });
            }
          }, 1000);
        }
      }, 100);
    });
  </script>
